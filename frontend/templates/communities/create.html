{% extends "base.html" %}
{% block title %}Create Community — PeerSphere{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card-glass">
            <h4 class="card-glass-title"><i class="bi bi-plus-circle me-2"></i>Create Community</h4>
            <p class="text-muted mb-4">Build a space for your peers to connect and collaborate.</p>
            <form method="POST" action="{{ url_for('communities.create') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label-custom">Community Name</label>
                    <input type="text" name="name" class="form-control-modern" placeholder="e.g., AI/ML Students" required>
                </div>
                <div class="mb-3 form-check form-switch pt-2">
                    <input class="form-check-input" type="checkbox" role="switch" id="requiresApproval" name="requires_approval">
                    <label class="form-check-label fw-bold" for="requiresApproval" style="color:var(--text-main);">Require Admin Approval for New Members</label>
                </div>
                <div class="mb-4">
                    <label class="form-label-custom">Description</label>
                    <textarea name="description" class="form-control-modern" rows="4" placeholder="What is this community about?"></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100"><i class="bi bi-rocket-takeoff me-1"></i>Create Community</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
