{% extends "base.html" %}
{% block title %}Become a Mentor — PeerSphere{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card-glass">
            <h4 class="card-glass-title"><i class="bi bi-mortarboard me-2"></i>Become a Mentor</h4>
            <p class="text-muted mb-4">Share your knowledge and guide the next generation of students.</p>
            <form method="POST" action="{{ url_for('mentors.register') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label-custom">Areas of Expertise</label>
                    <input type="text" name="expertise" class="form-control-modern" placeholder="e.g., Software Engineering, System Design, Machine Learning" required>
                    <small class="text-muted">Separate multiple areas with commas</small>
                </div>
                <div class="mb-4">
                    <label class="form-label-custom">Availability</label>
                    <select name="availability" class="form-control-modern">
                        <option value="Available">Available</option>
                        <option value="Weekends">Weekends Only</option>
                        <option value="Weekday evenings">Weekday Evenings</option>
                        <option value="Flexible">Flexible</option>
                        <option value="Limited">Limited Availability</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100"><i class="bi bi-star me-1"></i>Register as Mentor</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
